<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accounts Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="main">
    <header class="topbar">
      <div>
        <span class="eyebrow">Your money places</span>
        <h1 class="page-title">Keep every account together</h1>
        <p class="page-subtitle">A simple home for every bank, card, cash account, and investment.</p>
      </div>
    </header>

    <section class="card user-note-card">
      <div class="card-header">
        <h2 class="card-title">User Notes</h2>
      </div>
      <p class="muted">Add every bank, cash, credit card, or investment account you want to track. Accounts feed the Add Transaction dropdown and dashboard filters.</p>
    </section>

    <section class="grid" style="margin-top:16px;">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Accounts Setup</h2>
        </div>
        <form id="accountForm" class="form-grid" style="margin-bottom:14px;">
          <div class="form-field">
            <label>Name</label>
            <input id="accountName" required>
          </div>
          <div class="form-field">
            <label>Type</label>
            <select id="accountType">
              <option>Bank</option>
              <option>Cash</option>
              <option>Credit Card</option>
              <option>Investment</option>
            </select>
          </div>
          <div class="form-field full">
            <button class="primary-btn" type="submit">Add Account</button>
          </div>
        </form>
        <table id="accountsTable"></table>
      </div>
    </section>
  </main>

  <script type="module" src="/accounts.js"></script>
</body>
</html>
