<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Transaction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="main">
    <header class="topbar">
      <div>
        <h1 class="page-title">Add Transaction</h1>
        <p class="page-subtitle">Record income or expenses by main and sub category</p>
      </div>
    </header>

    <section class="card user-note-card">
      <div class="card-header">
        <h2 class="card-title">User Notes</h2>
      </div>
      <p class="muted">Choose Income for money received and Expense for spending. The main category controls which subcategories appear, so keep Categories Setup updated before entering regular transactions.</p>
    </section>

    <section class="card" style="margin-top:16px;">
      <form id="transactionForm" class="form-grid">
        <div class="form-field">
          <label>Date</label>
          <input type="date" id="txDate" required>
        </div>
        <div class="form-field">
          <label>Type</label>
          <select id="txType">
            <option>Expense</option>
            <option>Income</option>
          </select>
        </div>
        <div class="form-field">
          <label>Main Category</label>
          <select id="txMainCategory" required></select>
        </div>
        <div class="form-field">
          <label>Sub Category</label>
          <select id="txSubCategory" required></select>
        </div>
        <div class="form-field">
          <label>Account</label>
          <select id="txAccount"></select>
        </div>
        <div class="form-field">
          <label>Amount</label>
          <input type="number" step="0.01" id="txAmount" required>
        </div>
        <div class="form-field">
          <label>Description</label>
          <input id="txDescription">
        </div>
        <div class="form-field full">
          <button class="primary-btn" type="submit">Save Transaction</button>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="/transactions.js"></script>
</body>
</html>
